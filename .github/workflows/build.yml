name: Build YouTube and Piko Releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_RUNNER_DEBUG: true
  NODE_OPTIONS: --no-deprecation

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  workflow_call:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version_tag: ${{ steps.check.outputs.version_tag }}
    steps:
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Checkout Repository
        uses: actions/checkout@v4
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get remote release info
          REMOTE_RELEASE=$(curl -s https://api.github.com/repos/anddea/revanced-patches/releases/latest)
          REMOTE_TAG=$(echo "$REMOTE_RELEASE" | jq -r .tag_name)
          REMOTE_DATE=$(echo "$REMOTE_RELEASE" | jq -r .published_at)
          
          if [ "$REMOTE_TAG" = "null" ] || [ -z "$REMOTE_TAG" ]; then
            echo "Error: Could not fetch remote release info"
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get local release info
          LOCAL_YT_RELEASE=$(gh release list --limit 100 --json tagName,publishedAt --jq 'map(select(.tagName | startswith("YouTube-"))) | .[0]' 2>/dev/null || echo "null")
          LOCAL_PX_RELEASE=$(gh release list --limit 100 --json tagName,publishedAt --jq 'map(select(.tagName | startswith("PikoX-"))) | .[0]' 2>/dev/null || echo "null")
          
          LOCAL_YT_TAG=$(echo "$LOCAL_YT_RELEASE" | jq -r 'if . == null then "" else .tagName // "" end')
          LOCAL_YT_DATE=$(echo "$LOCAL_YT_RELEASE" | jq -r 'if . == null then "" else .publishedAt // "" end')
          LOCAL_PX_TAG=$(echo "$LOCAL_PX_RELEASE" | jq -r 'if . == null then "" else .tagName // "" end')
          LOCAL_PX_DATE=$(echo "$LOCAL_PX_RELEASE" | jq -r 'if . == null then "" else .publishedAt // "" end')

          echo "Remote: $REMOTE_TAG ($REMOTE_DATE)"
          echo "Local YT: $LOCAL_YT_TAG ($LOCAL_YT_DATE)"
          echo "Local PX: $LOCAL_PX_TAG ($LOCAL_PX_DATE)"
          
          if [ "$REMOTE_TAG" != "null" ] && [ "$REMOTE_TAG" != "" ]; then
            # Check if remote date is newer than either local date, or patch asset changed
            NEEDS_BUILD=false
            
            if [ -z "$LOCAL_YT_DATE" ] || [ "$(date -d "$REMOTE_DATE" +%s)" -gt "$(date -d "$LOCAL_YT_DATE" +%s)" ]; then
              NEEDS_BUILD=true
              echo "YouTube needs update: new remote release"
            fi
            
            if [ -z "$LOCAL_PX_DATE" ] || [ "$(date -d "$REMOTE_DATE" +%s)" -gt "$(date -d "$LOCAL_PX_DATE" +%s)" ]; then
              NEEDS_BUILD=true
              echo "PikoX needs update: new remote release"
            fi
            
            # Also check if tag changed
            LOCAL_YT_TAG_SHORT=$(echo "$LOCAL_YT_TAG" | sed 's/YouTube-//' || echo "")
            LOCAL_PX_TAG_SHORT=$(echo "$LOCAL_PX_TAG" | sed 's/PikoX-//' || echo "")
            
            if [ "$REMOTE_TAG" != "$LOCAL_YT_TAG_SHORT" ] || [ "$REMOTE_TAG" != "$LOCAL_PX_TAG_SHORT" ]; then
              NEEDS_BUILD=true
              echo "Tag mismatch detected: remote=$REMOTE_TAG, yt=$LOCAL_YT_TAG_SHORT, px=$LOCAL_PX_TAG_SHORT"
            fi
            
            if [ "$NEEDS_BUILD" = "true" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "version_tag=$REMOTE_TAG" >> $GITHUB_OUTPUT
              gh release view "$REMOTE_TAG" --repo anddea/revanced-patches \
                --json body --template '{{.body}}' > changelog.txt || \
                echo "No changelog available" > changelog.txt
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Changelog
        if: steps.check.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.txt
        env:
          NODE_OPTIONS: --no-deprecation --max-old-space-size=4096

  build-youtube:
    needs: check-updates
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Checkout Repository
        uses: actions/checkout@v4
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Check if YouTube Release Exists
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "YouTube-${{ needs.check-updates.outputs.version_tag }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
        env:
          NODE_OPTIONS: --no-deprecation --max-old-space-size=4096

      - name: Build YouTube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "/usr/local/bin/bash" ]; then
            /usr/local/bin/bash ./build.sh config.youtube.toml
          else
            ./build.sh config.youtube.toml
          fi

      - name: Move APKs to Build Directory
        run: |
          if [ -f "/usr/local/bin/bash" ]; then
            /usr/local/bin/bash ./fix-apks.sh
          else
            ./fix-apks.sh
          fi

      - name: Verify APK Files Exist
        run: |
          echo "Checking for APK files in build directory..."
          APK_COUNT=$(find build -name "*youtube*.apk" -type f | wc -l)
          echo "Found $APK_COUNT YouTube APK files"
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No YouTube APK files found in build directory!"
            ls -la build/
            exit 1
          fi
          find build -name "*youtube*.apk" -type f -exec echo "Found: {}" \;

      - name: Download Changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog
        env:
          NODE_OPTIONS: --no-deprecation --max-old-space-size=4096

      - name: Upload YouTube APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: youtube-apks
          path: build/*youtube*.apk
          retention-days: 7
        env:
          NODE_OPTIONS: --no-deprecation --max-old-space-size=4096

      - name: Create or Update YouTube Release
        if: steps.release_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: build/*youtube*.apk
          tag_name: YouTube-${{ needs.check-updates.outputs.version_tag }}
          name: YouTube Morphe ${{ needs.check-updates.outputs.version_tag }}
          body_path: changelog.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --no-deprecation --max-old-space-size=4096

      - name: Update Existing YouTube Release
        if: steps.release_check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Updating existing YouTube release..."
          # Delete existing assets
          gh release view "YouTube-${{ needs.check-updates.outputs.version_tag }}" --json assets --jq '.assets[].name' | grep -E '\.apk$' | while read asset; do
            echo "Deleting existing asset: $asset"
            gh release delete-asset "YouTube-${{ needs.check-updates.outputs.version_tag }}" "$asset" --yes
          done
          # Upload new APKs
          UPLOAD_COUNT=0
          for apk in build/*youtube*.apk; do
            if [ -f "$apk" ]; then
              echo "Uploading: $(basename "$apk")"
              gh release upload "YouTube-${{ needs.check-updates.outputs.version_tag }}" "$apk"
              UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
            fi
          done
          echo "Uploaded $UPLOAD_COUNT APK files to YouTube release"
          if [ "$UPLOAD_COUNT" -eq 0 ]; then
            echo "ERROR: No APK files were uploaded!"
            exit 1
          fi

  build-piko-x:
    needs: check-updates
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Checkout Repository
        uses: actions/checkout@v4
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Check if PikoX Release Exists
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "PikoX-${{ needs.check-updates.outputs.version_tag }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
        env:
          NODE_OPTIONS: --no-deprecation --max-old-space-size=4096

      - name: Build Piko X
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "/usr/local/bin/bash" ]; then
            /usr/local/bin/bash ./build.sh config.piko.toml
          else
            ./build.sh config.piko.toml
          fi

      - name: Move APKs to Build Directory
        run: |
          if [ -f "/usr/local/bin/bash" ]; then
            /usr/local/bin/bash ./fix-apks.sh
          else
            ./fix-apks.sh
          fi

      - name: Verify APK Files Exist
        run: |
          echo "Checking for APK files in build directory..."
          APK_COUNT=$(find build -name "*twitter*.apk" -type f | wc -l)
          echo "Found $APK_COUNT Piko X APK files"
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "ERROR: No Piko X APK files found in build directory!"
            ls -la build/
            exit 1
          fi
          find build -name "*twitter*.apk" -type f -exec echo "Found: {}" \;

      - name: Download Changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog
        env:
          NODE_OPTIONS: --no-deprecation --max-old-space-size=4096

      - name: Upload Piko X APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pikox-apks
          path: build/*twitter*.apk
          retention-days: 7
        env:
          NODE_OPTIONS: --no-deprecation --max-old-space-size=4096

      - name: Create or Update Piko X Release
        if: steps.release_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: build/*twitter*.apk
          tag_name: PikoX-${{ needs.check-updates.outputs.version_tag }}
          name: Piko X (Twitter) Morphe ${{ needs.check-updates.outputs.version_tag }}
          body_path: changelog.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --no-deprecation --max-old-space-size=4096

      - name: Update Existing Piko X Release
        if: steps.release_check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Updating existing Piko X release..."
          # Delete existing assets
          gh release view "PikoX-${{ needs.check-updates.outputs.version_tag }}" --json assets --jq '.assets[].name' | grep -E '\.apk$' | while read asset; do
            echo "Deleting existing asset: $asset"
            gh release delete-asset "PikoX-${{ needs.check-updates.outputs.version_tag }}" "$asset" --yes
          done
          # Upload new APKs
          UPLOAD_COUNT=0
          for apk in build/*twitter*.apk; do
            if [ -f "$apk" ]; then
              echo "Uploading: $(basename "$apk")"
              gh release upload "PikoX-${{ needs.check-updates.outputs.version_tag }}" "$apk"
              UPLOAD_COUNT=$((UPLOAD_COUNT + 1))
            fi
          done
          echo "Uploaded $UPLOAD_COUNT APK files to Piko X release"
          if [ "$UPLOAD_COUNT" -eq 0 ]; then
            echo "ERROR: No APK files were uploaded!"
            exit 1
          fi
