name: Build YouTube & Piko X (Twitter)
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version_tag: ${{ steps.check.outputs.version_tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMOTE_TAG=$(curl -s https://api.github.com/repos/anddea/revanced-patches/releases/latest | jq -r .tag_name)
          LOCAL_YT=$(gh release list --limit 10 | grep "YouTube-" | head -n 1 | awk '{print $3}' | sed 's/YouTube-//' || echo "")
          LOCAL_PX=$(gh release list --limit 10 | grep "PikoX-" | head -n 1 | awk '{print $3}' | sed 's/PikoX-//' || echo "")
          echo "Remote: $REMOTE_TAG | Local YT: $LOCAL_YT | Local PX: $LOCAL_PX"
          if [ "$REMOTE_TAG" != "null" ] && [ "$REMOTE_TAG" != "" ]; then
            if [ "$REMOTE_TAG" != "$LOCAL_YT" ] || [ "$REMOTE_TAG" != "$LOCAL_PX" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "version_tag=$REMOTE_TAG" >> $GITHUB_OUTPUT
              gh release view "$REMOTE_TAG" --repo anddea/revanced-patches \
                --json body --template '{{.body}}' > changelog.txt || \
                echo "No changelog available" > changelog.txt
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Changelog
        if: steps.check.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.txt

  build-youtube:
    needs: check-updates
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check if YouTube Release Exists
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "YouTube-${{ needs.check-updates.outputs.version_tag }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        if: steps.release_check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build YouTube
        if: steps.release_check.outputs.exists == 'false'
        run: |
          rm -rf github-builds
          npm install -g git+https://github.com/decipher3114/revanced-creator.git
          revanced-creator build \
            --patches-source anddea/revanced-patches \
            --integrations-source anddea/revanced-integrations \
            --app com.google.android.youtube \
            --exclude-patch material-you \
            --output github-builds
          if ! ls github-builds/*.apk 1>/dev/null 2>&1; then
            echo "Błąd: Nie wygenerowano APK dla YouTube"
            exit 1
          fi

      - name: Download Changelog
        if: steps.release_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Create YouTube Release
        if: steps.release_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          files: github-builds/*.apk
          tag_name: YouTube-${{ needs.check-updates.outputs.version_tag }}
          name: YouTube anddea ${{ needs.check-updates.outputs.version_tag }}
          body_path: changelog.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-piko-x:
    needs: check-updates
    if: needs.check-updates.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check if PikoX Release Exists
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "PikoX-${{ needs.check-updates.outputs.version_tag }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        if: steps.release_check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build Piko X
        if: steps.release_check.outputs.exists == 'false'
        run: |
          rm -rf github-builds
          npm install -g git+https://github.com/decipher3114/revanced-creator.git
          revanced-creator build \
            --patches-source anddea/revanced-patches \
            --integrations-source anddea/revanced-integrations \
            --app com.twitter.android \
            --exclude-patch custom-branding \
            --output github-builds
          if ! ls github-builds/*.apk 1>/dev/null 2>&1; then
            echo "Błąd: Nie wygenerowano APK dla Piko X"
            exit 1
          fi

      - name: Download Changelog
        if: steps.release_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Create Piko X Release
        if: steps.release_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          files: github-builds/*.apk
          tag_name: PikoX-${{ needs.check-updates.outputs.version_tag }}
          name: Piko X (Twitter) anddea ${{ needs.check-updates.outputs.version_tag }}
          body_path: changelog.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
