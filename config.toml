parallel-jobs = 1
remove-rv-integrations-checks = true
debug = true

[main]
cli-source = "ReVanced/revanced-cli"
out-type = "apk"
remove-rv-integrations-checks = true

[default]
cli-source = "ReVanced/revanced-cli"
cli-args = []

# ==================== YouTube anddea ====================
[[youtube-anddea]]
app-name = "com.google.android.youtube"
enabled = true
build-mode = "apk"
version = "19.47.53"
arch = "arm64-v8a"
include-stock = false

cli-source = "ReVanced/revanced-cli"
patches-source = "anddea/revanced-patches"
integrations-source = ""

patcher-args = "--include 'GmsCore support'"

archive-dlurl = "https://archive.org/download/geologically/apks/com.google.android.youtube/YouTube_19.47.53.apk"

# ==================== X / Twitter (Morphe) ====================
[[twitter-morphe]]
app-name = "com.twitter.android"
enabled = true
build-mode = "apk"
version = "auto"
arch = "arm64-v8a"
include-stock = false

cli-source = "ReVanced/revanced-cli"
patches-source = "anddea/revanced-patches"
integrations-source = ""

patcher-args = "-e 'Bring back twitter'"

archive-dlurl = "https://archive.org/download/geologically/apks/com.twitter.android/Twitter_10.21.0-release.0.apk"
dpi = "120-640dpi"